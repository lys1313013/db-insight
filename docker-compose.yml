services:
  db:
    image: postgres:15
    container_name: db-insight-postgres-app
    environment:
      POSTGRES_USER: dbinsight
      POSTGRES_PASSWORD: dbinsight123
      POSTGRES_DB: db_insight
    ports:
      - "5434:5432"
    volumes:
      - db-insight-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbinsight -d db_insight"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/lys1313013/db-insight-backend:latest
    container_name: db-insight-backend
    environment:
      DB_INSIGHT_DB_URL: jdbc:postgresql://db:5432/db_insight
      DB_INSIGHT_DB_USER: dbinsight
      DB_INSIGHT_DB_PASSWORD: dbinsight123
      JWT_SECRET: replace-with-a-secure-secret
    ports:
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/lys1313013/db-insight-frontend:latest
    container_name: db-insight-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-insight-data:

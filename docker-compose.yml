services:
  backend:
    image: ${ALIYUN_ACR_REGISTRY}/${ALIYUN_ACR_NAMESPACE}/db-insight-backend:${BACKEND_TAG:-latest}
    container_name: db-insight-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "12381:9090"
    networks:
      - db-insight-network
    restart: unless-stopped

  frontend:
    image: ${ALIYUN_ACR_REGISTRY}/${ALIYUN_ACR_NAMESPACE}/db-insight-frontend:${FRONTEND_TAG:-latest}
    container_name: db-insight-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:12380
    ports:
      - "12380:80"
    depends_on:
      - backend
    networks:
      - db-insight-network
    restart: unless-stopped

volumes:
  db-insight-data:

networks:
  db-insight-network:
    driver: bridge

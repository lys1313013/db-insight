server:
  port: 0

spring:
  application:
    name: db-insight-test
  datasource:
    url: jdbc:h2:mem:dbinsight-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-only-secret-32-bytes-or-more-padding-padding-padding
    expiration-hours: 1
  cors:
    allowed-origins: http://localhost:3000

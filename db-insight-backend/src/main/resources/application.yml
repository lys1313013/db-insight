server:
  port: 9090

spring:
  application:
    name: db-insight
  datasource:
    url: ${DB_INSIGHT_DB_URL:jdbc:postgresql://localhost:15434/db_insight}
    username: ${DB_INSIGHT_DB_USER:dbinsight}
    password: ${DB_INSIGHT_DB_PASSWORD:dbinsight123}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-do-not-use-in-prod-32b}
    expiration-hours: 24
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

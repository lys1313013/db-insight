name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'db-insight-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'db-insight-backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('db-insight-backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: |
          cd db-insight-backend
          ./mvnw clean compile -q

      - name: Test
        run: |
          cd db-insight-backend
          ./mvnw test -q

      - name: Package
        run: |
          cd db-insight-backend
          ./mvnw package -DskipTests -q

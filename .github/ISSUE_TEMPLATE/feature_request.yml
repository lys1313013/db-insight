name: Feature Request
description: Suggest a new feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature
      placeholder: Describe the feature you want...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: The problem is...
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you solve this problem?
      placeholder: I suggest...
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions considered?
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request?
